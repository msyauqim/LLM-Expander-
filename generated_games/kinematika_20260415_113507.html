<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Edukasi</title>
<style>
/* ==========================================
   GAME EDUKASI - SCI-FI NEON THEME
   ========================================== */

/* === RESET & BASE === */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Orbitron', 'Segoe UI', 'Roboto', sans-serif;
  color: #E0E0E0;
  background: #0A0E27;
}

/* === MAIN CONTAINER === */
#game-container {
  width: 100%;
  height: 100vh;
  background: linear-gradient(160deg, #0A0E27 0%, #1A237E 40%, #0D47A1 70%, #01579B 100%);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#game-container::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(13, 71, 161, 0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(255, 109, 0, 0.1) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 80%, rgba(1, 87, 155, 0.2) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* === SCENE AREA === */
#scene-area {
  position: relative;
  width: 95%;
  max-width: 960px;
  height: 75vh;
  max-height: 620px;
  background: rgba(10, 14, 39, 0.65);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(13, 71, 161, 0.45);
  border-radius: 20px;
  box-shadow:
    0 0 40px rgba(13, 71, 161, 0.25),
    0 0 80px rgba(13, 71, 161, 0.1),
    inset 0 0 60px rgba(13, 71, 161, 0.05);
  z-index: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#scene-area::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 20%;
  right: 20%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #FF6D00, rgba(255, 109, 0, 0.6), #FF6D00, transparent);
  border-radius: 2px;
  animation: topLineGlow 3s ease-in-out infinite;
}

@keyframes topLineGlow {
  0%, 100% { opacity: 0.6; left: 20%; right: 20%; }
  50% { opacity: 1; left: 10%; right: 10%; }
}

/* === CONTENT AREA === */
#content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  z-index: 2;
  gap: 16px;
}

/* === HUD DISPLAYS === */
#score-display,
#lives-display,
#timer-display {
  font-family: 'Orbitron', monospace;
  font-size: 0.95rem;
  font-weight: 700;
  padding: 8px 18px;
  background: rgba(10, 14, 39, 0.8);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(13, 71, 161, 0.5);
  border-radius: 10px;
  color: #E0E0E0;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  position: relative;
  z-index: 5;
  transition: all 0.3s ease;
  box-shadow: 0 0 15px rgba(13, 71, 161, 0.2);
}

#score-display {
  color: #FF6D00;
  border-color: rgba(255, 109, 0, 0.4);
  box-shadow: 0 0 15px rgba(255, 109, 0, 0.15);
}

#lives-display {
  color: #ef5350;
  border-color: rgba(239, 83, 80, 0.4);
  box-shadow: 0 0 15px rgba(239, 83, 80, 0.15);
}

#timer-display {
  color: #4FC3F7;
  border-color: rgba(79, 195, 247, 0.4);
  box-shadow: 0 0 15px rgba(79, 195, 247, 0.15);
  animation: timerPulse 2s ease-in-out infinite;
}

@keyframes timerPulse {
  0%, 100% { box-shadow: 0 0 15px rgba(79, 195, 247, 0.15); }
  50% { box-shadow: 0 0 25px rgba(79, 195, 247, 0.35); }
}

/* HUD Bar layout */
.hud-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 16px 20px;
  gap: 12px;
  flex-shrink: 0;
}

/* === SCREENS === */
#start-screen,
#game-screen,
#end-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  transition: opacity 0.5s ease, transform 0.5s ease;
  z-index: 3;
}

#start-screen h1,
#end-screen h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.6rem, 4vw, 2.8rem);
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 4px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #4FC3F7, #FF6D00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleShimmer 4s ease-in-out infinite;
  text-align: center;
}

@keyframes titleShimmer {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.4); }
}

#start-screen p,
#end-screen p {
  font-size: 1rem;
  color: rgba(224, 224, 224, 0.75);
  margin-bottom: 28px;
  text-align: center;
  max-width: 500px;
  line-height: 1.7;
}

/* === BUTTONS - ALIVE & ANIMATED === */
.btn-primary,
.btn-secondary,
#instructions-btn {
  position: relative;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 14px 36px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  outline: none;
  overflow: hidden;
  transition: all 0.1s ease;
  z-index: 10;
  /* --- FLOATING ANIMATION --- */
  animation: btnFloat 3s ease-in-out infinite;
}

.btn-primary {
  background: linear-gradient(135deg, #FF6D00, #FF8F00, #FF6D00);
  background-size: 200% 200%;
  color: #0A0E27;
  box-shadow:
    0 4px 20px rgba(255, 109, 0, 0.4),
    0 0 40px rgba(255, 109, 0, 0.15),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
  animation:
    btnFloat 3s ease-in-out infinite,
    btnGradientShift 4s ease-in-out infinite,
    btnPulseGlow 2s ease-in-out infinite;
}

.btn-secondary {
  background: rgba(13, 71, 161, 0.25);
  color: #4FC3F7;
  border: 2px solid rgba(79, 195, 247, 0.5);
  box-shadow:
    0 4px 20px rgba(13, 71, 161, 0.2),
    0 0 30px rgba(79, 195, 247, 0.08);
  animation:
    btnFloat 3.5s ease-in-out infinite 0.5s,
    btnBorderPulse 2.5s ease-in-out infinite;
}

#instructions-btn {
  background: rgba(26, 35, 126, 0.35);
  color: #E0E0E0;
  border: 1px solid rgba(224, 224, 224, 0.2);
  box-shadow: 0 4px 15px rgba(10, 14, 39, 0.3);
  animation:
    btnFloat 4s ease-in-out infinite 1s,
    btnSubtlePulse 3s ease-in-out infinite;
}

/* --- FLOATING KEYFRAMES --- */
@keyframes btnFloat {
  0%, 100% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-6px);
  }
}

@keyframes btnGradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes btnPulseGlow {
  0%, 100% {
    box-shadow:
      0 4px 20px rgba(255, 109, 0, 0.4),
      0 0 40px rgba(255, 109, 0, 0.15),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }
  50% {
    box-shadow:
      0 6px 30px rgba(255, 109, 0, 0.6),
      0 0 60px rgba(255, 109, 0, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }
}

@keyframes btnBorderPulse {
  0%, 100% {
    border-color: rgba(79, 195, 247, 0.5);
    box-shadow:
      0 4px 20px rgba(13, 71, 161, 0.2),
      0 0 30px rgba(79, 195, 247, 0.08);
  }
  50% {
    border-color: rgba(79, 195, 247, 0.9);
    box-shadow:
      0 4px 25px rgba(13, 71, 161, 0.35),
      0 0 45px rgba(79, 195, 247, 0.2);
  }
}

@keyframes btnSubtlePulse {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 1; }
}

/* --- INNER SHIMMER LINE (moving shine) --- */
.btn-primary::before,
.btn-secondary::before,
#instructions-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255, 255, 255, 0.15),
    transparent
  );
  transform: skewX(-20deg);
  animation: btnShimmer 3.5s ease-in-out infinite;
  pointer-events: none;
}

.btn-primary::before {
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255, 255, 255, 0.25),
    transparent
  );
  animation-duration: 2.5s;
}

@keyframes btnShimmer {
  0%, 70%, 100% { left: -100%; }
  85% { left: 150%; }
}

/* --- HOVER: AMPLIFIED MOTION --- */
.btn-primary:hover {
  animation:
    btnHoverBounce 0.4s ease-out,
    btnGradientShift 2s ease-in-out infinite;
  box-shadow:
    0 8px 40px rgba(255, 109, 0, 0.6),
    0 0 80px rgba(255, 109, 0, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
  transform: translateY(-4px) scale(1.06);
  filter: brightness(1.15);
}

.btn-secondary:hover {
  animation: btnHoverBounce 0.4s ease-out;
  background: rgba(13, 71, 161, 0.45);
  border-color: #4FC3F7;
  color: #fff;
  box-shadow:
    0 8px 35px rgba(79, 195, 247, 0.35),
    0 0 60px rgba(79, 195, 247, 0.15);
  transform: translateY(-4px) scale(1.06);
}

#instructions-btn:hover {
  animation: btnHoverBounce 0.4s ease-out;
  background: rgba(26, 35, 126, 0.55);
  border-color: rgba(224, 224, 224, 0.5);
  box-shadow:
    0 8px 30px rgba(26, 35, 126, 0.3),
    0 0 40px rgba(224, 224, 224, 0.08);
  transform: translateY(-4px) scale(1.06);
}

@keyframes btnHoverBounce {
  0% { transform: translateY(0) scale(1); }
  30% { transform: translateY(-8px) scale(1.08); }
  60% { transform: translateY(-2px) scale(1.04); }
  100% { transform: translateY(-4px) scale(1.06); }
}

/* --- ACTIVE / CLICK: SQUISH --- */
.btn-primary:active,
.btn-secondary:active,
#instructions-btn:active {
  animation: btnSquish 0.2s ease-out;
  transform: translateY(1px) scale(0.96) !important;
}

@keyframes btnSquish {
  0% { transform: scale(1.06); }
  50% { transform: scale(0.92); }
  100% { transform: scale(0.96); }
}

/* === CARDS === */
.card {
  background: rgba(10, 14, 39, 0.55);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(13, 71, 161, 0.35);
  border-radius: 16px;
  padding: 24px;
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.3),
    0 0 20px rgba(13, 71, 161, 0.08);
  transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(79, 195, 247, 0.5), transparent);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
  border-color: rgba(79, 195, 247, 0.5);
  box-shadow:
    0 16px 48px rgba(0, 0, 0, 0.4),
    0 0 40px rgba(13, 71, 161, 0.18);
}

.card:hover::after {
  opacity: 1;
}

/* === FEEDBACK STATES === */
.correct {
  border-color: #00E676 !important;
  box-shadow:
    0 0 30px rgba(0, 230, 118, 0.35),
    0 0 60px rgba(0, 230, 118, 0.12),
    inset 0 0 20px rgba(0, 230, 118, 0.05) !important;
  animation: correctFlash 0.6s ease-out;
}

@keyframes correctFlash {
  0% { background-color: rgba(0, 230, 118, 0.25); transform: scale(1.05); }
  50% { background-color: rgba(0, 230, 118, 0.12); }
  100% { background-color: transparent; transform: scale(1); }
}

.incorrect {
  border-color: #FF1744 !important;
  box-shadow:
    0 0 30px rgba(255, 23, 68, 0.35),
    0 0 60px rgba(255, 23, 68, 0.12),
    inset 0 0 20px rgba(255, 23, 68, 0.05) !important;
  animation: incorrectShake 0.5s ease-out;
}

@keyframes incorrectShake {
  0%, 100% { transform: translateX(0); }
  10%, 50%, 90% { transform: translateX(-6px); background-color: rgba(255, 23, 68, 0.15); }
  30%, 70% { transform: translateX(6px); }
}

/* === GLOW EFFECT === */
.glow {
  animation: neonGlow 2s ease-in-out infinite;
}

@keyframes neonGlow {
  0%, 100% {
    text-shadow:
      0 0 5px rgba(79, 195, 247, 0.5),
      0 0 15px rgba(79, 195, 247, 0.3),
      0 0 30px rgba(13, 71, 161, 0.2);
  }
  50% {
    text-shadow:
      0 0 10px rgba(79, 195, 247, 0.8),
      0 0 30px rgba(79, 195, 247, 0.5),
      0 0 60px rgba(13, 71, 161, 0.35);
  }
}

/* === ANIMATIONS === */
.fade-in {
  animation: fadeIn 0.6s ease-out forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* === HIDDEN STATE === */
.hidden {
  display: none !important;
}

/* === ACTIVE STATE === */
.active {
  display: flex !important;
}

/* === PARTICLES === */
.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: particleDrift linear infinite;
}

.particle:nth-child(odd) {
  background: rgba(79, 195, 247, 0.6);
  box-shadow: 0 0 8px rgba(79, 195, 247, 0.4);
}

.particle:nth-child(even) {
  background: rgba(255, 109, 0, 0.5);
  box-shadow: 0 0 8px rgba(255, 109, 0, 0.3);
}

.particle:nth-child(3n) {
  width: 2px;
  height: 2px;
  background: rgba(224, 224, 224, 0.3);
  box-shadow: 0 0 6px rgba(224, 224, 224, 0.2);
}

@keyframes particleDrift {
  0% {
    transform: translateY(100vh) translateX(0) scale(0);
    opacity: 0;
  }
  10% {
    opacity: 1;
    transform: translateY(90vh) translateX(10px) scale(1);
  }
  90% {
    opacity: 0.6;
  }
  100% {
    transform: translateY(-10vh) translateX(-20px) scale(0.3);
    opacity: 0;
  }
}

.particle:nth-child(1) { left: 5%; animation-duration: 12s; animation-delay: 0s; }
.particle:nth-child(2) { left: 15%; animation-duration: 9s; animation-delay: 1.5s; }
.particle:nth-child(3) { left: 25%; animation-duration: 15s; animation-delay: 3s; }
.particle:nth-child(4) { left: 35%; animation-duration: 10s; animation-delay: 0.8s; }
.particle:nth-child(5) { left: 45%; animation-duration: 13s; animation-delay: 2.2s; }
.particle:nth-child(6) { left: 55%; animation-duration: 11s; animation-delay: 4s; }
.particle:nth-child(7) { left: 65%; animation-duration: 14s; animation-delay: 1s; }
.particle:nth-child(8) { left: 75%; animation-duration: 8s; animation-delay: 3.5s; }
.particle:nth-child(9) { left: 85%; animation-duration: 16s; animation-delay: 0.5s; }
.particle:nth-child(10) { left: 95%; animation-duration: 10s; animation-delay: 2.8s; }

/* === SCAN LINE OVERLAY (subtle CRT feel) === */
#game-container::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.03) 2px,
    rgba(0, 0, 0, 0.03) 4px
  );
  pointer-events: none;
  z-index: 999;
}

/* === SCROLLBAR === */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: rgba(10, 14, 39, 0.5);
}

::-webkit-scrollbar-thumb {
  background: rgba(13, 71, 161, 0.5);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(79, 195, 247, 0.5);
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  #scene-area {
    width: 98%;
    height: 85vh;
    max-height: none;
    border-radius: 14px;
  }

  .hud-bar {
    padding: 10px 12px;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }

  #score-display,
  #lives-display,
  #timer-display {
    font-size: 0.75rem;
    padding: 6px 12px;
  }

  .btn-primary,
  .btn-secondary,
  #instructions-btn {
    font-size: 0.85rem;
    padding: 12px 28px;
  }

  #content-area {
    padding: 16px;
  }

  .card {
    padding: 16px;
  }

  #start-screen,
  #game-screen,
  #end-screen {
    padding: 20px;
  }
}

@media (max-width: 480px) {
  #scene-area {
    width: 100%;
    height: 100vh;
    border-radius: 0;
  }

  #start-screen h1,
  #end-screen h1 {
    letter-spacing: 2px;
  }

  .btn-primary,
  .btn-secondary,
  #instructions-btn {
    font-size: 0.78rem;
    padding: 11px 22px;
    letter-spacing: 1px;
  }

  .hud-bar {
    gap: 6px;
  }

  #score-display,
  #lives-display,
  #timer-display {
    font-size: 0.68rem;
    padding: 5px 10px;
  }
}

/* === BUTTON GROUP STAGGER ANIMATION === */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

.btn-group .btn-primary {
  animation-delay: 0s;
}

.btn-group .btn-secondary {
  animation-delay: 0.3s;
}

.btn-group #instructions-btn {
  animation-delay: 0.6s;
}

/* === SELECTION HIGHLIGHT === */
::selection {
  background: rgba(255, 109, 0, 0.35);
  color: #fff;
}

/* === FOCUS ACCESSIBILITY === */
.btn-primary:focus-visible,
.btn-secondary:focus-visible,
#instructions-btn:focus-visible,
.card:focus-visible {
  outline: 2px solid #4FC3F7;
  outline-offset: 3px;
}
</style>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Fisika Virtual - Hukum Newton</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #1a2332;
    --bg-card-hover: #1f2b3d;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-green: #10b981;
    --accent-yellow: #f59e0b;
    --accent-red: #ef4444;
    --accent-purple: #8b5cf6;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #2d3748;
    --glow-blue: rgba(59, 130, 246, 0.3);
    --glow-cyan: rgba(6, 182, 212, 0.3);
    --glow-green: rgba(16, 185, 129, 0.3);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  #game-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    position: relative;
  }

  /* Animated background */
  .bg-particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: floatParticle linear infinite;
  }

  @keyframes floatParticle {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.15; }
    90% { opacity: 0.15; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  /* Hidden class */
  .hidden {
    display: none !important;
  }

  /* Fade in */
  .fade-in {
    animation: fadeIn 0.5s ease-out forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px var(--glow-blue); }
    50% { box-shadow: 0 0 40px var(--glow-blue), 0 0 60px var(--glow-cyan); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .glow {
    animation: glow-pulse 2s ease-in-out infinite;
  }

  /* Buttons */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.5px;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px var(--glow-blue);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-primary::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(transparent, rgba(255,255,255,0.1), transparent);
    transform: rotate(45deg);
    transition: 0.5s;
  }

  .btn-primary:hover::after {
    left: 100%;
  }

  .btn-secondary {
    background: transparent;
    color: var(--text-secondary);
    border: 2px solid var(--border);
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-secondary:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: rgba(59, 130, 246, 0.1);
  }

  .btn-small {
    padding: 8px 18px;
    font-size: 0.85rem;
    border-radius: 8px;
  }

  /* Card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: all 0.3s ease;
  }

  .card:hover {
    border-color: rgba(59, 130, 246, 0.3);
    background: var(--bg-card-hover);
  }

  /* ============ START SCREEN ============ */
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 90vh;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .start-icon {
    width: 120px;
    height: 120px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    margin-bottom: 30px;
    animation: pulse 3s ease-in-out infinite;
    box-shadow: 0 10px 40px rgba(139, 92, 246, 0.3);
  }

  .start-title {
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan), var(--accent-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .start-subtitle {
    font-size: 1.2rem;
    color: var(--text-secondary);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .start-badge {
    display: inline-block;
    background: rgba(139, 92, 246, 0.15);
    color: var(--accent-purple);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    border: 1px solid rgba(139, 92, 246, 0.3);
    margin-bottom: 30px;
  }

  .start-description {
    max-width: 600px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 40px;
    font-size: 1rem;
  }

  .start-features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 600px;
    margin-bottom: 40px;
    width: 100%;
  }

  .feature-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
  }

  .feature-icon {
    font-size: 1.8rem;
    margin-bottom: 8px;
  }

  .feature-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .start-buttons {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  /* ============ GAME SCREEN ============ */
  #game-screen {
    position: relative;
    z-index: 1;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 20px;
  }

  .game-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .game-logo {
    font-size: 1.5rem;
  }

  .game-title-small {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-primary);
  }

  .game-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg-secondary);
    border-radius: 10px;
    border: 1px solid var(--border);

  .stat-icon {
    font-size: 1.1rem;
  }

  .stat-value {
    font-weight: 700;
    font-size: 1rem;
    color: var(--text-primary);
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #score-display { color: var(--accent-green); }
  #lives-display { color: var(--accent-red); }
  #timer-display { color: var(--accent-yellow); }

  /* Scene Area */
  #scene-area {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 20px;
    margin-bottom: 20px;
  }

  .simulation-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .sim-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);

  .sim-title {
    font-weight: 700;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .experiment-badge {
    display: inline-block;
    background: rgba(6, 182, 212, 0.15);
    color: var(--accent-cyan);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .sim-canvas-container {
    position: relative;
    width: 100%;
    height: 360px;
    background: linear-gradient(180deg, #0f1729 0%, #162032 100%);

  }

  #sim-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .sim-overlay-info {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;

  .sim-data-tag {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;

    border: 1px solid rgba(6, 182, 212, 0.2);

  /* Control Panel */
  .control-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .control-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .control-card-title {
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-primary);
  }

  .slider-group {
    margin-bottom: 16px;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .slider-name {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .slider-value {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent-cyan);
    font-family: 'JetBrains Mono', monospace;
  }

  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    height: 6px;
    background: var(--bg-secondary);
    border-radius: 3px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    cursor: pointer;
    box-shadow: 0 2px 8px var(--glow-blue);
    transition: transform 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    cursor: pointer;
    border: none;
    box-shadow: 0 2px 8px var(--glow-blue);
  }

  .input-group {
    margin-bottom: 14px;
  }

  .input-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .input-field {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-secondary);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    transition: all 0.3s ease;
    outline: none;
  }

  .input-field:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 15px var(--glow-blue);
  }

  .input-field.correct {
    border-color: var(--accent-green);
    box-shadow: 0 0 15px var(--glow-green);
    animation: none;
  }

  .input-field.incorrect {
    border-color: var(--accent-red);
    box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
    animation: shake 0.5s ease;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .btn-row .btn-primary,
  .btn-row .btn-secondary {
    flex: 1;
  }

  /* Content Area - Questions */
  #content-area {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .question-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .question-number {
    font-size: 0.85rem;
    color: var(--accent-purple);
    font-weight: 600;
    background: rgba(139, 92, 246, 0.15);
    padding: 4px 12px;
    border-radius: 6px;
  }

  .question-difficulty {
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 600;
  }

  .diff-easy { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
  .diff-medium { background: rgba(245, 158, 11, 0.15); color: var(--accent-yellow); }
  .diff-hard { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }

  .question-text {
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--text-primary);
    margin-bottom: 20px;
  }

  .question-formula {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-cyan);
    font-size: 1.1rem;
    text-align: center;
    letter-spacing: 1px;
  }

  .answer-section {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .answer-section .input-group {
    flex: 1;
    margin-bottom: 0;
  }

  .answer-unit {
    font-size: 0.85rem;
    color: var(--text-muted);
    padding-bottom: 12px;
    font-weight: 500;
  }

  /* Feedback */
  .feedback-container {
    margin-top: 16px;
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.6;
    display: none;
  }

  .feedback-container.show {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  .feedback-correct {
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.3);
    color: var(--accent-green);
  }

  .feedback-incorrect {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--accent-red);
  }

  /* Progress bar */
  .progress-bar-container {
    width: 100%;
    height: 4px;
    background: var(--bg-secondary);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 16px;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* ============ END SCREEN ============ */
  #end-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 90vh;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .end-trophy {
    font-size: 5rem;
    margin-bottom: 20px;
    animation: pulse 2s ease-in-out infinite;
  }

  .end-title {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--accent-yellow), var(--accent-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .end-message {
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-bottom: 30px;
  }

  .end-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 500px;
    width: 100%;
    margin-bottom: 40px;
  }

  .end-stat {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 16px;
  }

  .end-stat-value {
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent-cyan);
    margin-bottom: 4px;
  }

  .end-stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .end-grade {
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 16px;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 24px;
    background: var(--bg-card);
    border: 3px solid var(--accent-green);
    box-shadow: 0 0 30px var(--glow-green);
  }

  .end-buttons {
    display: flex;
    gap: 16px;
  }

  /* ============ MODALS ============ */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal-content {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    max-width: 540px;
    width: 90%;
    animation: fadeIn 0.3s ease;
    max-height: 80vh;
    overflow-y: auto;

  .modal-title {
    font-size: 1.4rem;

    align-items: center;

  .modal-body {

    font-size: 0.95rem;
  }

  .modal-body p {
    margin-bottom: 12px;
  }

  .modal-body ul {
    margin-left: 20px;
    margin-bottom: 12px;
  }

  .modal-body li {
    margin-bottom: 6px;
  }

  .modal-body .formula-highlight {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: monospace;
    color: var(--accent-cyan);
    display: block;
    text-align: center;
    margin: 12px 0;

  .modal-close {
    margin-top: 20px;

  /* Data readout panel */
  .data-readout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;

  .readout-item {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .readout-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .readout-value {
    font-size: 1.1rem;
    font-weight: 700;

  /* Select dropdown */
  .select-field {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-secondary);

    background-repeat: no-repeat;
    background-position: right 12px center;
  }

  .select-field:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 15px var(--glow-blue);

      grid-template-columns: 1fr;

      grid-template-columns: 1fr;

    }

      height: 260px;
    }

    .answer-section {
      flex-direction: column;
      align-items: stretch;
    }
  }

  /* Scrollbar */
  ::-webkit-scrollbar {
    width: 6px;

  ::-webkit-scrollbar-track {
    background: var(--bg-primary);

  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--text-muted);
  }

@keyframes bubbleFloat {
    0% { transform: translateY(0) scale(1); opacity: 0.7; }
    50% { transform: translateY(-30px) scale(1.1); opacity: 1; }
    100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
}

@keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(108, 92, 231, 0.3); }
    50% { box-shadow: 0 0 40px rgba(108, 92, 231, 0.6); }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes confetti-fall {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.particle {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    animation: bubbleFloat 2s ease-out forwards;
}

    opacity: 0.5;

}

.title-section p {

}

.btn-primary {

    font-weight: 600;

    font-family: 'Poppins', sans-serif;

    overflow: hidden;
}

.btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
}

.btn-primary:active {
    transform: translateY(-1px);
}

.btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
}

}

.btn-secondary {
    background: var(--glass);
    color: var(--text);
    border: 1px solid var(--glass-border);
    padding: 12px 32px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Poppins', sans-serif;
    backdrop-filter: blur(10px);
}

.btn-secondary:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--primary);
    transform: translateY(-2px);
}

.start-buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
}

.features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 20px;
    max-width: 700px;
}

.feature-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px 15px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}

.feature-card:hover {
    transform: translateY(-5px);
    border-color: var(--primary);
}

.feature-card .icon {
    font-size: 2rem;
    margin-bottom: 8px;
}

.feature-card h3 {
    font-size: 0.85rem;
    font-weight: 600;
}

.feature-card p {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 4px;
}

/* ===== GAME SCREEN ===== */
#game-screen {
    display: none;
    flex-direction: column;
    gap: 20px;
    animation: fadeIn 0.5s ease;
}

#game-screen.active {
    display: flex;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 12px 24px;

}

.stat-item {
    display: flex;
    align-items: center;

}

.stat-item .stat-icon {
    font-size: 1.3rem;
}

.stat-item .stat-value {
    font-size: 1.1rem;
    font-weight: 700;
    min-width: 40px;
}

#score-display { color: var(--warning); }
#lives-display { color: var(--danger); }
#timer-display { color: var(--secondary); }

.progress-section {
    display: flex;
    align-items: center;
    gap: 10px;
}

.progress-bar {
    width: 120px;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    border-radius: 4px;
    transition: width 0.5s ease;
}

.progress-text {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 500;
}

#scene-area {
    display: flex;
    gap: 20px;

}

.lab-bench {
    flex: 2;

    overflow: hidden;
}

.lab-bench::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
}

.experiment-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.experiment-desc {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 20px;
    line-height: 1.6;
}

.experiment-visual {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 200px;
    margin: 20px 0;
    position: relative;
}

.beaker {
    width: 120px;
    height: 160px;
    border: 4px solid rgba(255,255,255,0.3);

    align-items: flex-end;
    overflow: hidden;
    transition: all 0.5s ease;
}

.beaker-liquid {
    width: 100%;

    border-radius: 0 0 16px 16px;
    position: relative;
}

.beaker-liquid.bubbling::after {
    content: '○ ○ ○';
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.8rem;
    animation: bubbleFloat 1.5s ease-in-out infinite;
    color: rgba(255,255,255,0.5);
}

.plus-sign {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--text-dim);
    margin: 0 20px;
}

.arrow-sign {
    font-size: 2rem;
    color: var(--secondary);
    margin: 0 20px;
    animation: pulse 1.5s ease-in-out infinite;
}

.result-beaker {
    border-color: var(--secondary);
    box-shadow: 0 0 30px rgba(0, 206, 201, 0.2);
}

.sidebar {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

#content-area {
    background: var(--bg-card);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 20px;
    flex: 1;
}

.question-section h3 {
    font-size: 1rem;
    margin-bottom: 15px;
    color: var(--secondary);
    font-weight: 600;
}

.options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.option-btn {
    background: var(--glass);
    border: 2px solid var(--glass-border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: left;
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    gap: 12px;
}

.option-btn:hover:not(.disabled) {
    border-color: var(--primary);
    background: rgba(108, 92, 231, 0.1);
    transform: translateX(5px);
}

.option-btn.correct {
    border-color: var(--success);
    background: rgba(0, 184, 148, 0.15);
    animation: pulse 0.5s ease;
}

.option-btn.incorrect {
    border-color: var(--danger);
    background: rgba(225, 112, 85, 0.15);
    animation: shake 0.5s ease;
}

.option-btn.disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.option-letter {
    width: 32px;

    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
}

.correct .option-letter { background: var(--success); }
.incorrect .option-letter { background: var(--danger); }

.tools-panel {
    background: var(--bg-card);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 16px;
}

.tools-panel h4 {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.tool-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.tool-btn {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.85rem;
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
}

.tool-btn:hover {
    background: rgba(108, 92, 231, 0.2);
    border-color: var(--primary);
}

/* ===== FEEDBACK ===== */
.feedback-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);

    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(5px);
    animation: fadeIn 0.3s ease;
}

.feedback-card {
    background: var(--bg-card);

    animation: slideUp 0.4s ease;
}

    font-size: 4rem;

}

    font-size: 1.5rem;
    margin-bottom: 10px;
}

}

.feedback-card .explanation {

}

.feedback-card .btn-primary {

    font-size: 1rem;
}

/* ===== MODAL ===== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(5px);
    animation: fadeIn 0.3s ease;
}

.modal-content {
    background: var(--bg-card);
    border: 1px solid var(--glass-border);

    align-items: center;

}

    gap: 15px;
    margin-bottom: 16px;

    background: var(--glass);
    border-radius: 12px;
}

    width: 36px;
    height: 36px;
    border-radius: 50%;

    align-items: center;
    justify-content: center;

.result-stat {

.result-stat .label {

.end-buttons {

/* ===== HINT POPUP ===== */
.hint-popup {

    right: 30px;

    border-radius: 16px;
    padding: 20px;

    box-shadow: 0 10px 40px rgba(0,0,0,0.3);

.hint-popup h4 {

    align-items: center;
    gap: 8px;
}

.hint-popup p {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.5;
}

.hint-close {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1.2rem;
}

/* ===== CONFETTI ===== */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    z-index: 2000;
    animation: confetti-fall 3s linear forwards;
    pointer-events: none;
}

/* ===== TIMER WARNING ===== */
.timer-warning {
    color: var(--danger) !important;
    animation: pulse 0.5s ease-in-out infinite;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .title-section h1 { font-size: 2rem; }

    .sidebar { flex-direction: row; flex-wrap: wrap; }

    .lab-logo { width: 100px; height: 100px; font-size: 50px; border-radius: 20px; }
}
