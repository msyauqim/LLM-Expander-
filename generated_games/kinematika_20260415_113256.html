<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Edukasi</title>
<style>
```css
/* ===== GAME EDUKASI - SCI-FI NEON THEME ===== */

/* --- Reset & Base --- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Orbitron', 'Segoe UI', 'Roboto', sans-serif;
  color: #E0E0E0;
  background: #0A0E27;
}

/* --- Main Container --- */
#game-container {
  width: 100vw;
  height: 100vh;
  background: linear-gradient(160deg, #0A0E27 0%, #1A237E 40%, #0D47A1 70%, #01579B 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Animated background grid */
#game-container::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(13, 71, 161, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(13, 71, 161, 0.08) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridScroll 20s linear infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes gridScroll {
  0% { transform: translate(0, 0); }
  100% { transform: translate(60px, 60px); }
}

/* Ambient glow overlay */
#game-container::after {
  content: '';
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(13, 71, 161, 0.25) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 0;
  animation: ambientPulse 6s ease-in-out infinite alternate;
}

@keyframes ambientPulse {
  0% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.3); }
}

/* --- Scene Area --- */
#scene-area {
  position: relative;
  width: 90%;
  max-width: 1000px;
  height: 70vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

/* --- Content Area --- */
#content-area {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  position: relative;
  z-index: 2;
}

/* --- HUD Displays --- */
#score-display,
#lives-display,
#timer-display {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  font-weight: 700;
  padding: 8px 20px;
  border-radius: 8px;
  background: rgba(10, 14, 39, 0.75);
  border: 1px solid rgba(13, 71, 161, 0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: #E0E0E0;
  text-shadow: 0 0 8px rgba(13, 71, 161, 0.8);
  box-shadow:
    0 0 12px rgba(13, 71, 161, 0.3),
    inset 0 0 8px rgba(13, 71, 161, 0.1);
  position: absolute;
  z-index: 10;
  transition: all 0.3s ease;
  user-select: none;
}

#score-display {
  top: 12px;
  left: 12px;
}

#score-display::before {
  content: '⚡ ';
}

#lives-display {
  top: 12px;
  right: 12px;
}

#lives-display::before {
  content: '❤ ';
}

#timer-display {
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
}

#timer-display::before {
  content: '⏱ ';
}

#score-display:hover,
#lives-display:hover,
#timer-display:hover {
  border-color: #FF6D00;
  box-shadow: 0 0 20px rgba(255, 109, 0, 0.4);
}

/* --- Screens --- */
#start-screen,
#game-screen,
#end-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px;
  z-index: 5;
  transition: opacity 0.5s ease, transform 0.5s ease;
}

#start-screen {
  z-index: 6;
}

#end-screen {
  z-index: 7;
}

#start-screen h1,
#end-screen h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #E0E0E0 0%, #FF6D00 50%, #0D47A1 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleShimmer 3s linear infinite;
  text-shadow: none;
  filter: drop-shadow(0 0 20px rgba(255, 109, 0, 0.4));
}

@keyframes titleShimmer {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

#start-screen p,
#end-screen p {
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  color: rgba(224, 224, 224, 0.8);
  text-align: center;
  max-width: 500px;
  line-height: 1.6;
}

/* --- Buttons --- */
.btn-primary,
.btn-secondary {
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  padding: 14px 36px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  position: relative;
  overflow: hidden;
  transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  user-select: none;
  outline: none;
}

.btn-primary {
  background: linear-gradient(135deg, #FF6D00 0%, #FF8F00 50%, #FF6D00 100%);
  background-size: 200% 200%;
  color: #0A0E27;
  box-shadow:
    0 4px 20px rgba(255, 109, 0, 0.5),
    0 0 40px rgba(255, 109, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

.btn-primary:hover {
  background-position: 100% 100%;
  transform: translateY(-3px) scale(1.03);
  box-shadow:
    0 8px 32px rgba(255, 109, 0, 0.6),
    0 0 60px rgba(255, 109, 0, 0.35),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

.btn-primary:active {
  transform: translateY(0) scale(0.98);
  box-shadow:
    0 2px 12px rgba(255, 109, 0, 0.4),
    inset 0 2px 4px rgba(0, 0, 0, 0.2);
}

/* Neon sweep effect */
.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  transition: left 0.5s ease;
}

.btn-primary:hover::before {
  left: 100%;
}

.btn-secondary {
  background: rgba(13, 71, 161, 0.3);
  color: #E0E0E0;
  border: 2px solid rgba(13, 71, 161, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow:
    0 4px 16px rgba(13, 71, 161, 0.3),
    inset 0 0 12px rgba(13, 71, 161, 0.1);
}

.btn-secondary:hover {
  background: rgba(13, 71, 161, 0.5);
  border-color: #FF6D00;
  transform: translateY(-3px) scale(1.03);
  color: #FF6D00;
  box-shadow:
    0 8px 28px rgba(13, 71, 161, 0.4),
    0 0 20px rgba(255, 109, 0, 0.2),
    inset 0 0 16px rgba(255, 109, 0, 0.05);
}

.btn-secondary:active {
  transform: translateY(0) scale(0.98);
}

.btn-secondary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(13, 71, 161, 0.2), transparent);
  transition: left 0.5s ease;
}

.btn-secondary:hover::before {
  left: 100%;
}

#instructions-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  padding: 10px 24px;
  background: transparent;
  color: rgba(224, 224, 224, 0.6);
  border: 1px solid rgba(224, 224, 224, 0.2);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 1px;
  text-transform: uppercase;
}

#instructions-btn:hover {
  color: #FF6D00;
  border-color: #FF6D00;
  box-shadow: 0 0 16px rgba(255, 109, 0, 0.3);
  background: rgba(255, 109, 0, 0.05);
}

/* --- Cards --- */
.card {
  background: rgba(10, 14, 39, 0.6);
  border: 1px solid rgba(13, 71, 161, 0.4);
  border-radius: 16px;
  padding: 24px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.4),
    0 0 20px rgba(13, 71, 161, 0.15),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  user-select: none;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #0D47A1, #FF6D00, #0D47A1, transparent);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.card:hover {
  transform: translateY(-6px);
  border-color: rgba(255, 109, 0, 0.5);
  box-shadow:
    0 16px 48px rgba(0, 0, 0, 0.5),
    0 0 30px rgba(13, 71, 161, 0.25),
    0 0 15px rgba(255, 109, 0, 0.15);
}

.card:hover::before {
  opacity: 1;
}

/* --- Correct / Incorrect States --- */
.correct {
  border-color: #00E676 !important;
  box-shadow:
    0 0 24px rgba(0, 230, 118, 0.5),
    0 0 48px rgba(0, 230, 118, 0.2),
    inset 0 0 16px rgba(0, 230, 118, 0.1) !important;
  animation: correctPulse 0.6s ease;
}

@keyframes correctPulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.06); }
  60% { transform: scale(0.98); }
  100% { transform: scale(1); }
}

.correct::after {
  content: '✓';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  color: #00E676;
  text-shadow: 0 0 20px rgba(0, 230, 118, 0.8);
  animation: checkmarkAppear 0.4s ease-out;
  pointer-events: none;
}

@keyframes checkmarkAppear {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

.incorrect {
  border-color: #FF1744 !important;
  box-shadow:
    0 0 24px rgba(255, 23, 68, 0.5),
    0 0 48px rgba(255, 23, 68, 0.2),
    inset 0 0 16px rgba(255, 23, 68, 0.1) !important;
  animation: incorrectShake 0.5s ease;
}

@keyframes incorrectShake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-10px); }
  30% { transform: translateX(10px); }
  45% { transform: translateX(-8px); }
  60% { transform: translateX(8px); }
  75% { transform: translateX(-4px); }
  90% { transform: translateX(4px); }
}

.incorrect::after {
  content: '✗';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  color: #FF1744;
  text-shadow: 0 0 20px rgba(255, 23, 68, 0.8);
  animation: checkmarkAppear 0.4s ease-out;
  pointer-events: none;
}

/* --- Particles --- */
.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}

.particle:nth-child(6n+1) {
  width: 4px;
  height: 4px;
  background: #0D47A1;
  box-shadow: 0 0 8px #0D47A1, 0 0 16px rgba(13, 71, 161, 0.5);
  animation: particleFloat1 12s linear infinite;
}

.particle:nth-child(6n+2) {
  width: 3px;
  height: 3px;
  background: #FF6D00;
  box-shadow: 0 0 6px #FF6D00, 0 0 12px rgba(255, 109, 0, 0.4);
  animation: particleFloat2 15s linear infinite;
}

.particle:nth-child(6n+3) {
  width: 2px;
  height: 2px;
  background: #E0E0E0;
  box-shadow: 0 0 4px rgba(224, 224, 224, 0.6);
  animation: particleFloat3 18s linear infinite;
}

.particle:nth-child(6n+4) {
  width: 5px;
  height: 5px;
  background: rgba(13, 71, 161, 0.6);
  box-shadow: 0 0 10px rgba(13, 71, 161, 0.4);
  animation: particleFloat4 20s linear infinite;
}

.particle:nth-child(6n+5) {
  width: 3px;
  height: 3px;
  background: rgba(255, 109, 0, 0.5);
  box-shadow: 0 0 8px rgba(255, 109, 0, 0.3);
  animation: particleFloat5 14s linear infinite;
}

.particle:nth-child(6n+6) {
  width: 2px;
  height: 2px;
  background: #01579B;
  box-shadow: 0 0 6px rgba(1, 87, 155, 0.5);
  animation: particleFloat6 16s linear infinite;
}

@keyframes particleFloat1 {
  0% { transform: translate(0, 100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translate(100px, -20vh) rotate(360deg); opacity: 0; }
}

@keyframes particleFloat2 {
  0% { transform: translate(0, 100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.8; }
  100% { transform: translate(-80px, -20vh) rotate(-360deg); opacity: 0; }
}

@keyframes particleFloat3 {
  0% { transform: translate(0, 100vh); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translate(50px, -20vh); opacity: 0; }
}

@keyframes particleFloat4 {
  0% { transform: translate(0, 100vh) scale(0.5); opacity: 0; }
  50% { transform: translate(-60px, 50vh) scale(1); opacity: 0.5; }
  100% { transform: translate(40px, -20vh) scale(0.5); opacity: 0; }
}

@keyframes particleFloat5 {
  0% { transform: translate(0, 100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  50% { transform: translate(90px, 40vh) rotate(180deg); }
  90% { opacity: 0.7; }
  100% { transform: translate(-30px, -20vh) rotate(360deg); opacity: 0; }
}

@keyframes particleFloat6 {
  0% { transform: translate(0, 100vh); opacity: 0; }
  10% { opacity: 0.5; }
  90% { opacity: 0.5; }
  100% { transform: translate(-100px, -20vh); opacity: 0; }
}

/* --- Glow Effect --- */
.glow {
  animation: neonGlow 2s ease-in-out infinite alternate;
}

@keyframes neonGlow {
  0% {
    text-shadow:
      0 0 5px rgba(13, 71, 161, 0.5),
      0 0 10px rgba(13, 71, 161, 0.3),
      0 0 20px rgba(13, 71, 161, 0.2);
    filter: brightness(1);
  }
  100% {
    text-shadow:
      0 0 10px rgba(255, 109, 0, 0.6),
      0 0 20px rgba(255, 109, 0, 0.4),
      0 0 40px rgba(255, 109, 0, 0.2),
      0 0 60px rgba(255, 109, 0, 0.1);
    filter: brightness(1.15);
  }
}

/* --- Fade In --- */
.fade-in {
  animation: fadeIn 0.6s ease-out forwards;
}

@keyframes fadeIn {
  0% {
    opacity: 0;
    transform: translateY(20px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

/* --- Hidden State --- */
.hidden {
  display: none !important;
}

/* --- Active State --- */
.active {
  border-color: #FF6D00 !important;
  box-shadow:
    0 0 20px rgba(255, 109, 0, 0.4),
    0 0 40px rgba(255, 109, 0, 0.15),
    inset 0 0 12px rgba(255, 109, 0, 0.08) !important;
}

/* --- Scrollbar Styling --- */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: rgba(10, 14, 39, 0.5);
}

::-webkit-scrollbar-thumb {
  background: rgba(13, 71, 161, 0.6);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: #FF6D00;
}

/* --- Selection --- */
::selection {
  background: rgba(255, 109, 0, 0.3);
  color: #E0E0E0;
}

/* --- Focus Visible (Accessibility) --- */
:focus-visible {
  outline: 2px solid #FF6D00;
  outline-offset: 3px;
  border-radius: 4px;
}

/* --- Modal / Instructions Overlay --- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 14, 39, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.3s ease-out;
}

.modal-content {
  background: rgba(26, 35, 126, 0.4);
  border: 1px solid rgba(13, 71, 161, 0.6);
  border-radius: 20px;
  padding: 40px;
  max-width: 500px;
  width: 90%;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow:
    0 24px 64px rgba(0, 0, 0, 0.6),
    0 0 40px rgba(13, 71, 161, 0.2);
  animation: modalSlideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

@keyframes modalSlideIn {
  0% {
    opacity: 0;
    transform: scale(0.9) translateY(20px);
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

/* --- Hint Tooltip --- */
.hint-tooltip {
  position: absolute;
  background: rgba(10, 14, 39, 0.9);
  border: 1px solid #FF6D00;
  border-radius: 10px;
  padding: 12px 18px;
  font-size: 0.85rem;
  color: #E0E0E0;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow:
    0 8px 24px rgba(0, 0, 0, 0.5),
    0 0 16px rgba(255, 109, 0, 0.2);
  z-index: 50;
  max-width: 280px;
  animation: hintAppear 0.3s ease-out;
}

.hint-tooltip::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 12px;
  height: 12px;
  background: rgba(10, 14, 39, 0.9);
  border-right: 1px solid #FF6D00;
  border-bottom: 1px solid #FF6D00;
}

@keyframes hintAppear {
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* --- Feedback Toast --- */
.feedback-toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 32px;
  border-radius: 12px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  z-index: 200;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  animation: toastSlideUp 0.4s ease-out, toastFadeOut 0.4s ease-in 2.6s forwards;
}

.feedback-toast.success {
  background: rgba(0, 230, 118, 0.15);
  border: 1px solid #00E676;
  color: #00E676;
  box-shadow: 0 8px 24px rgba(0, 230, 118, 0.3);
}

.feedback-toast.error {
  background: rgba(255, 23, 68, 0.15);
  border: 1px solid #FF1744;
  color: #FF1744;
  box-shadow: 0 8px 24px rgba(255, 23, 68, 0.3);
}

@keyframes toastSlideUp {
  0% { opacity: 0; transform: translateX(-50%) translateY(30px); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@keyframes toastFadeOut {
  0% { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
}

/* --- Progress Bar --- */
.progress-bar {
  width: 100%;
  height: 6px;
  background: rgba(13, 71, 161, 0.2);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #0D47A1, #FF6D00);
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  box-shadow: 0 0 10px rgba(255, 109, 0, 0.4);
  position: relative;
}

.progress-bar-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #FF6D00;
  box-shadow: 0 0 12px #FF6D00;
}

/* --- Score Popup Animation --- */
.score-popup {
  position: absolute;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.4rem;
  font-weight: 900;
  color: #FF6D00;
  text-shadow: 0 0 12px rgba(255, 109, 0, 0.6);
  pointer-events: none;
  animation: scorePopup 1s ease-out forwards;
  z-index: 50;
}

@keyframes scorePopup {
  0% {
    opacity: 1;
    transform: translateY(0) scale(0.5);
  }
  50% {
    transform: translateY(-40px) scale(1.2);
  }
  100% {
    opacity: 0;
    transform: translateY(-80px) scale(0.8);
  }
}

/* --- Responsive Design --- */
@media (max-width: 768px) {
  #scene-area {
    width: 95%;
    height: 80vh;
  }

  #score-display,
  #lives-display,
  #timer-display {
    font-size: 0.8rem;
    padding: 6px 14px;
  }

  .btn-primary,
  .btn-secondary {
    font-size: 0.85rem;
    padding: 12px 28px;
    letter-spacing: 1px;
  }

  .card {
    padding: 18px;
    border-radius: 12px;
  }

  .modal-content {
    padding: 28px;
    margin: 16px;
  }

  #start-screen h1,
  #end-screen h1 {
    letter-spacing: 2px;
  }
}
</style>

    position: absolute;

    opacity: 0.15;
    animation: floatParticle linear infinite;

  @keyframes floatParticle {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.15; }

    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }

  @keyframes slideUp {
